version: 0.2

phases:
  install:
    commands:
      - choco install nodejs --version=20.18.0 -y --no-progress
      - choco install visualstudio2019buildtools --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --includeRecommended" -y --no-progress
      - choco install rustup.install -y --no-progress
  
  pre_build:
    commands:
      - '[System.Environment]::SetEnvironmentVariable("Path", "C:\Users\ContainerAdministrator\.cargo\bin;" + [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User"), "Process")'
      - node --version
      - C:\Users\ContainerAdministrator\.cargo\bin\rustc.exe --version
      - C:\Users\ContainerAdministrator\.cargo\bin\cargo.exe --version
      - npm install
  
  build:
    commands:
      - '[System.Environment]::SetEnvironmentVariable("Path", "C:\Users\ContainerAdministrator\.cargo\bin;" + [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User"), "Process")'
      - Set-Location packages/sdk; npm install; npm run build; Set-Location ../..
      - npm run build:desktop

artifacts:
  files:
    - 'src-desktop/target/release/bundle/**/*'
  name: tauri-windows-build
