name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Run fast CI lane
        id: fast_ci
        run: npm run ci:fast

      - name: Guidance report
        if: always()
        env:
          BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          FAST_CI_RESULT: ${{ steps.fast_ci.outcome }}
        run: |
          if [ -n "$BASE_REF" ] && [ -n "$HEAD_REF" ]; then
            BASELINE_STATUS="unknown"
            if [ "$FAST_CI_RESULT" = "success" ]; then
              BASELINE_STATUS="success"
            elif [ "$FAST_CI_RESULT" = "failure" ]; then
              BASELINE_STATUS="failed"
            fi
            node scripts/guidance-report.mjs \
              --run-id guidance-${{ github.run_id }} \
              --source-ref "${{ github.event_name }}:${{ github.ref }}" \
              --baseline-ci-fast-status "$BASELINE_STATUS" \
              --changed-from "$BASE_REF" \
              --changed-to "$HEAD_REF" \
              || true
          else
            echo "Skipping guidance-report: no diff range available" >> "$GITHUB_STEP_SUMMARY"
          fi

  connected-agents:
    name: Connected Agents Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Build SDK
        run: npm run build:sdk

      - name: Build Connect
        run: npm run build:connect

      - name: Run connected-agents suite
        run: npm run test:connected-agents

  playwright-full:
    name: Full Playwright Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npm run install:playwright:ci

      - name: Run full Playwright coverage contract
        run: npm run verify:e2e:full

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-full-report
          path: playwright-report/
          retention-days: 14
