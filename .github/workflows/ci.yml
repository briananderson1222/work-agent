name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build SDK
        run: cd packages/sdk && npm run build

      - name: Typecheck
        run: npx tsc --noEmit --skipLibCheck

      - name: Build server
        run: npm run build:server

      - name: Build UI
        run: npm run build:ui

      - name: Unit tests
        run: npm test -- --run

  integration:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Build SDK
        run: cd packages/sdk && npm run build

      - name: Build
        run: npm run build

      - name: Run integration tests
        run: |
          PORT=3141 node dist-server/index.js &
          sleep 5
          npx playwright test tests/plugin-system.spec.ts --reporter=list
        env:
          CI: true
