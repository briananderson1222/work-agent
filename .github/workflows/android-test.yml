name: Android Tests

on:
  workflow_run:
    workflows: [Build Android]
    types: [completed]
  # checkov:skip=CKV_GHA_7:Test workflow accepts optional run_id to reference prior build
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Build Android run ID to download APK from (leave blank to build fresh)'
        required: false

permissions:
  contents: read
  actions: read

jobs:
  mobile-playwright:
    name: Mobile Playwright (Android viewport)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Build SDK
        run: cd packages/sdk && npm run build

      - name: Build Connect
        run: cd packages/connect && npm run build

      - name: Build UI
        run: npm run build:ui

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start dev server
        run: npx vite preview --port 5173 --host &
        env:
          NODE_ENV: test

      - name: Wait for server
        run: npx wait-on http://localhost:5173 --timeout 30000

      - name: Run Android viewport tests
        run: npx playwright test --project=android --reporter=list,html

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: android-playwright-report
          path: playwright-report/
          retention-days: 14

  emulator-smoke:
    name: Emulator Smoke Test
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Download APK from triggering build
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: stallion-ai-android-debug
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: apk/

      - name: Download APK by run ID
        if: github.event_name == 'workflow_dispatch' && inputs.run_id != ''
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: stallion-ai-android-debug
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: apk/

      - name: List APK
        run: ls -lh apk/ && find apk/ -name "*.apk"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Write smoke test script
        run: |
          cat > smoke.sh << 'SCRIPT'
          #!/bin/bash
          set -e
          APK=$(find apk/ -name "*.apk" | head -1)
          echo "APK: $APK"
          adb install "$APK"
          adb shell am start -n xyz.briananderson.stallion/.MainActivity
          sleep 5
          adb shell pidof xyz.briananderson.stallion | grep -q "[0-9]" && echo "App process running" || (echo "App not running" && exit 1)
          adb logcat -d | grep -E "FATAL EXCEPTION|E AndroidRuntime" > crash.log || true
          if [ -s crash.log ]; then cat crash.log && exit 1; fi
          adb shell screencap -p /sdcard/smoke.png && adb pull /sdcard/smoke.png smoke-test.png
          echo "Smoke test passed"
          SCRIPT
          chmod +x smoke.sh

      - name: Run emulator smoke test
        uses: reactivecircus/android-emulator-runner@8654820a73a5f533f520f501653118e61b577bf5 # v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: bash smoke.sh

      - name: Upload emulator screenshot
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: android-smoke-screenshot
          path: smoke-test.png
          retention-days: 14
