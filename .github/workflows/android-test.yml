name: Android Tests

on:
  workflow_run:
    workflows: [Build Android]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Build Android run ID to download APK from (leave blank to build fresh)'
        required: false

permissions:
  contents: read
  actions: read

jobs:
  mobile-playwright:
    name: Mobile Playwright (Android viewport)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build SDK
        run: cd packages/sdk && npm run build

      - name: Build UI
        run: npm run build:ui

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start dev server
        run: npx vite preview --port 5173 --host &
        env:
          NODE_ENV: test

      - name: Wait for server
        run: npx wait-on http://localhost:5173 --timeout 30000

      - name: Run Android viewport tests
        run: npx playwright test --project=android --reporter=list,html

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-playwright-report
          path: playwright-report/
          retention-days: 14

  emulator-smoke:
    name: Emulator Smoke Test
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download APK from triggering build
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: stallion-ai-android-debug
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: apk/

      - name: Download APK by run ID
        if: github.event_name == 'workflow_dispatch' && inputs.run_id != ''
        uses: actions/download-artifact@v4
        with:
          name: stallion-ai-android-debug
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: apk/

      - name: List APK
        run: ls -lh apk/ && find apk/ -name "*.apk"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run emulator smoke test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            set -e
            APK=$(find apk/ -name "*.apk" | head -1)
            echo "Installing $APK"
            adb install "$APK"
            echo "Launching app"
            adb shell am start -n dev.voltagent.work_agent/.MainActivity
            sleep 5
            echo "Checking app is running"
            adb shell pidof dev.voltagent.work_agent | grep -q "[0-9]" && echo "App process running" || (echo "App not running" && exit 1)
            echo "Checking for crashes"
            adb logcat -d | grep -E "FATAL EXCEPTION|AndroidRuntime" > crash.log || true
            if [ -s crash.log ]; then cat crash.log && exit 1; fi
            echo "Taking screenshot"
            adb shell screencap -p /sdcard/smoke.png && adb pull /sdcard/smoke.png smoke-test.png
            echo "Smoke test passed"

      - name: Upload emulator screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-smoke-screenshot
          path: smoke-test.png
          retention-days: 14
