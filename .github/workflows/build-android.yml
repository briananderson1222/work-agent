name: Build Android

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-desktop

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - run: npm ci --legacy-peer-deps

      - name: Build SDK
        run: cd packages/sdk && npm run build

      - name: Build Connect
        run: cd packages/connect && npm run build

      - name: Build UI
        run: npm run build:ui

      - name: Tauri Android Init
        run: npx tauri android init
        working-directory: .
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Patch Android safe area (status bar insets)
        run: |
          # Patch the generated Android theme to respect system window insets
          # This prevents the WebView content from rendering behind the status bar
          STYLES_FILE="src-desktop/gen/android/app/src/main/res/values/styles.xml"
          if [ -f "$STYLES_FILE" ]; then
            # Add fitsSystemWindows to the app theme
            sed -i 's|</style>|    <item name="android:fitsSystemWindows">true</item>\n    </style>|' "$STYLES_FILE"
            echo "Patched styles.xml with fitsSystemWindows"
            cat "$STYLES_FILE"
          else
            echo "Warning: styles.xml not found at $STYLES_FILE"
            echo "Attempting MainActivity.kt patch instead..."
            # Fallback: patch MainActivity to set fitsSystemWindows programmatically
            MAIN_ACTIVITY=$(find src-desktop/gen/android -name "MainActivity.kt" -type f | head -1)
            if [ -n "$MAIN_ACTIVITY" ]; then
              sed -i '/super.onCreate/a\        window.decorView.systemUiVisibility = android.view.View.SYSTEM_UI_FLAG_LAYOUT_STABLE\n        androidx.core.view.WindowCompat.setDecorFitsSystemWindows(window, true)' "$MAIN_ACTIVITY"
              echo "Patched MainActivity.kt"
              cat "$MAIN_ACTIVITY"
            else
              echo "Error: Could not find MainActivity.kt to patch"
              exit 1
            fi
          fi

      - name: Build Android APK (debug)
        run: npx tauri android build --debug --apk
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: stallion-ai-android-debug
          path: src-desktop/gen/android/app/build/outputs/apk/universal/debug/*.apk
          retention-days: 14

      - name: Build Android APK (release)
        if: startsWith(github.ref, 'refs/tags/')
        run: npx tauri android build --apk
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload release APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Stallion AI ${{ github.ref_name }}'
          draft: true
          files: src-desktop/gen/android/app/build/outputs/apk/universal/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
