name: Update Manifest

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to generate manifest for'
        required: true

permissions:
  contents: write

jobs:
  generate-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Generate update manifest
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        with:
          script: |
            const tag = context.payload.release?.tag_name || process.env.INPUT_TAG;
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });

            const assets = release.data.assets;
            const manifest = {
              version: tag.replace('v', ''),
              notes: release.data.body || '',
              pub_date: release.data.published_at,
              platforms: {},
            };

            for (const asset of assets) {
              if (!asset.name.endsWith('.sig')) continue;

              const sigResponse = await github.request('GET ' + asset.url, {
                headers: { Accept: 'application/octet-stream' },
              });
              const signature = Buffer.from(sigResponse.data).toString('utf-8');
              const bundleName = asset.name.replace('.sig', '');
              const bundleAsset = assets.find(a => a.name === bundleName);
              if (!bundleAsset) continue;

              let platformKey = null;
              if (bundleName.includes('aarch64') && bundleName.endsWith('.app.tar.gz')) {
                platformKey = 'darwin-aarch64';
              } else if (bundleName.includes('x86_64') && bundleName.endsWith('.app.tar.gz')) {
                platformKey = 'darwin-x86_64';
              } else if (bundleName.endsWith('.AppImage.tar.gz')) {
                platformKey = 'linux-x86_64';
              } else if (bundleName.endsWith('.msi.zip')) {
                platformKey = 'windows-x86_64';
              }

              if (platformKey) {
                manifest.platforms[platformKey] = {
                  signature,
                  url: bundleAsset.browser_download_url,
                };
              }
            }

            const fs = require('fs');
            fs.mkdirSync('updates', { recursive: true });
            fs.writeFileSync('updates/update-manifest.json', JSON.stringify(manifest, null, 2));
            core.info('Generated manifest: ' + JSON.stringify(manifest, null, 2));

      - name: Upload manifest to release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.tag }}
          files: updates/update-manifest.json

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@e9c66a37f080288a11235e32cbe2dc5fb3a679cc # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./updates
          publish_branch: gh-pages
          keep_files: true
          destination_dir: updates
