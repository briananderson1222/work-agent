version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      frontend-tooling:
        patterns:
          - "@vitejs/*"
          - "vite"
          - "vitest"
          - "@vitest/*"
          - "@playwright/*"
          - "typescript"
          - "tsx"
      observability:
        patterns:
          - "@opentelemetry/*"
      aws:
        patterns:
          - "@aws-sdk/*"
          - "@smithy/*"
  - package-ecosystem: cargo
    directory: /src-desktop
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
